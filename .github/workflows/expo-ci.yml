name: Expo CI/CD for TestFlight

on:
  push:
    branches:
      - master  # Ensure it's triggering the correct branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3  # Fetch the latest code

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18  # Ensure Node.js 18 is used

      - name: Install Dependencies
        run: npm install  # Install all project dependencies

      - name: Install Expo & EAS CLI
        run: npm install -g expo-cli eas-cli  # Ensure Expo CLI is installed globally

      - name: Debug Authentication
        run: eas whoami  # Confirm Expo token authentication

      - name: Debug Credentials Before Build
        run: eas credentials:info  # Print credential details

      - name: Build for TestFlight
        run: eas build --profile testflight --platform ios --non-interactive

      - name: Upload to TestFlight
        run: eas submit --platform ios --profile testflight --non-interactive
