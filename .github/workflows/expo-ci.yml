name: Expo CI/CD for TestFlight

on:
  push:
    branches:
      - master  # Ensure you're triggering the correct branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3  # Fetches your code

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18  # Ensure the correct Node.js version

      - name: Install Dependencies
        run: npm install  # Install project dependencies

      - name: Install Expo & EAS CLI
        run: npm install -g expo-cli eas-cli  # Install Expo and EAS CLI globally

      - name: Authenticate with Expo using Token
        run: echo "EXPO_TOKEN=${{ secrets.EXPO_TOKEN }}" >> $GITHUB_ENV  # Store token in environment

      - name: Confirm Expo Authentication
        run: eas whoami  # Check if Expo token is recognized

      - name: Build for TestFlight
        run: eas build --profile testflight --platform ios --non-interactive | tee build-log.txt

      - name: Extract Build URL from Logs
        run: |
          BUILD_URL=$(grep -o 'https://expo.dev/accounts/[^ ]*/builds/[a-zA-Z0-9-]*' build-log.txt | tail -1)
          if [[ -z "$BUILD_URL" ]]; then
            echo "Error: Failed to retrieve build URL!"
            exit 1
          fi
          echo "EAS_BUILD_URL=$BUILD_URL" >> $GITHUB_ENV
          echo "✅ Build URL: $BUILD_URL"

      - name: Upload to TestFlight
        run: eas submit --platform ios --profile testflight --non-interactive  # Upload to TestFlight
